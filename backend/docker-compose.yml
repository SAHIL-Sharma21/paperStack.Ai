services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: paperstack-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2182:2181'
    healthcheck:
      test: ['CMD', 'nc', '-z', 'localhost', '2181']
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: paperstack-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '${KAFKA_HOST_PORT:-19092}:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:29092', '--list']
      interval: 10s
      timeout: 10s
      retries: 12

  mongo:
    image: mongo:7.0
    container_name: paperstack-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 10s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.5
    container_name: paperstack-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: dockerfile
      target: api
    container_name: paperstack-backend
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8001
      UPLOAD_DIR: /app/uploads
      MONGO_DB_URI: ${MONGO_DB_URI:-mongodb://mongo:27017/paperstack}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-paperstack-backend}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-document-processing}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-3600}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-access_token}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - '8001:8001'
    volumes:
      - uploads_data:/app/uploads

  consumer:
    platform: linux/amd64
    build:
      context: .
      dockerfile: dockerfile
      target: consumer
    container_name: paperstack-consumer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
      MONGO_DB_URI: ${MONGO_DB_URI:-mongodb://mongo:27017/paperstack}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-paperstack-backend}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-document-processing}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fastembed}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads

volumes:
  mongo_data:
  qdrant_data:
  uploads_data:
